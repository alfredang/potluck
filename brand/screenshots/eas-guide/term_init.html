<!DOCTYPE html>
<html>
<head>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #1a1a2e; padding: 20px; font-family: 'Fira Code', monospace; }
.terminal { background: #0d0d1a; border-radius: 8px; overflow: hidden; box-shadow: 0 10px 40px rgba(0,0,0,0.5); max-width: 800px; margin: 0 auto; }
.terminal-header { background: #16162a; padding: 10px 15px; display: flex; gap: 8px; }
.dot { width: 12px; height: 12px; border-radius: 50%; }
.dot-red { background: #ff5f56; }
.dot-yellow { background: #ffbd2e; }
.dot-green { background: #27c93f; }
.terminal-title { flex: 1; text-align: center; color: #6c6c8a; font-size: 13px; }
.terminal-body { padding: 20px; color: #e0e0e0; font-size: 14px; line-height: 1.6; }
.prompt { color: #61dafb; }
.command { color: #98c379; }
.output { color: #abb2bf; }
.comment { color: #5c6370; }
.success { color: #98c379; }
</style>
</head>
<body>
<div class="terminal">
  <div class="terminal-header">
    <div class="dot dot-red"></div><div class="dot dot-yellow"></div><div class="dot dot-green"></div>
    <div class="terminal-title">Terminal — ~/projects/potluck</div>
  </div>
  <div class="terminal-body">
    <div><span class="prompt">➜</span> <span class="command">eas init</span></div>
    <div class="output">
      <span class="comment"># Initialize EAS in your project</span><br>
      <br>
      Which EAS project to initialize? <span class="comment">Use arrow keys to select</span><br>
      <br>
      ❯ Select a project  →  potluck (potluckhub)<br>
      <br>
      <span class="success">✓</span> Successfully initialized EAS project<br>
      <span class="comment"># eas.json has been created</span><br>
      <span class="comment"># Run 'eas build:configure' to set up builds</span>
    </div>
  </div>
</div>
</body>
</html>
