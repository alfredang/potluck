<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WhatsApp Business Profile</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #25D366 0%, #128C7E 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .phone-frame {
      width: 375px;
      height: 700px;
      background: #fff;
      border-radius: 30px;
      box-shadow: 0 25px 50px rgba(0,0,0,0.3);
      overflow: hidden;
    }
    .header {
      background: #075E54;
      padding: 15px;
      display: flex;
      align-items: center;
      gap: 15px;
    }
    .back-btn {
      color: #fff;
      font-size: 20px;
      cursor: pointer;
    }
    .header h2 {
      color: #fff;
      font-size: 18px;
      font-weight: 500;
    }
    .content {
      padding: 20px;
    }
    .profile-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 25px;
    }
    .avatar {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      background: #e8e8e8;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 15px;
      border: 3px solid #25D366;
    }
    .avatar svg {
      width: 50px;
      height: 50px;
      fill: #999;
    }
    .change-photo {
      color: #25D366;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }
    .form-group {
      margin-bottom: 20px;
    }
    .form-group label {
      display: block;
      color: #555;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 8px;
      text-transform: uppercase;
    }
    .form-group input, .form-group textarea {
      width: 100%;
      padding: 12px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 15px;
      outline: none;
      transition: border-color 0.3s;
    }
    .form-group input:focus, .form-group textarea:focus {
      border-color: #25D366;
    }
    .form-group textarea {
      resize: none;
      height: 80px;
    }
    .category-select {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    .category-chip {
      padding: 8px 16px;
      border-radius: 20px;
      font-size: 13px;
      background: #f0f0f0;
      color: #555;
      cursor: pointer;
      border: 1px solid #ddd;
    }
    .category-chip.active {
      background: #25D366;
      color: #fff;
      border-color: #25D366;
    }
    .btn-save {
      background: #25D366;
      color: #fff;
      border: none;
      padding: 14px;
      border-radius: 25px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      width: 100%;
      margin-top: 10px;
    }
  </style>
</head>
<body>
  <div class="phone-frame">
    <div class="header">
      <span class="back-btn">←</span>
      <h2>Business Profile</h2>
    </div>
    <div class="content">
      <div class="profile-section">
        <div class="avatar">
          <svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
        </div>
        <span class="change-photo">Change Photo</span>
      </div>
      
      <div class="form-group">
        <label>Business Name</label>
        <input type="text" value="PotLuckHub">
      </div>
      
      <div class="form-group">
        <label>Category</label>
        <div class="category-select">
          <span class="category-chip">Restaurant</span>
          <span class="category-chip active">Food & Drink</span>
          <span class="category-chip">Retail</span>
          <span class="category-chip">Services</span>
        </div>
      </div>
      
      <div class="form-group">
        <label>Description</label>
        <textarea placeholder="Describe your business...">Your favorite food delivery service bringing delicious meals to your doorstep!</textarea>
      </div>
      
      <div class="form-group">
        <label>Address</label>
        <input type="text" value="123 Food Street, Singapore 123456">
      </div>
      
      <div class="form-group">
        <label>Business Hours</label>
        <input type="text" value="Mon-Sun: 9:00 AM - 10:00 PM">
      </div>
      
      <button class="btn-save">Save Profile</button>
    </div>
  </div>
</body>
</html>
